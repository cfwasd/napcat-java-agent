<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="叮咚 Bot logo">
  <defs>
    <linearGradient id="bg" x1="12" y1="12" x2="116" y2="116" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea" />
      <stop offset="100%" stop-color="#764ba2" />
    </linearGradient>
    <linearGradient id="bell" x1="40" y1="35" x2="88" y2="95" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffd54f" />
      <stop offset="100%" stop-color="#ffb300" />
    </linearGradient>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="64" cy="64" r="58" fill="url(#bg)" />

  <!-- 铃铛主体 -->
  <path d="M42 68 C42 45, 50 35, 64 35 C78 35, 86 45, 86 68 L88 82 L40 82 Z"
        fill="url(#bell)" stroke="#e6a800" stroke-width="1.5" />

  <!-- 铃铛顶部装饰 -->
  <circle cx="64" cy="30" r="5" fill="url(#bell)" stroke="#e6a800" stroke-width="1.5" />
  <rect x="61" y="30" width="6" height="4" rx="1" fill="#e6a800" />

  <!-- 铃铛底部 -->
  <rect x="37" y="80" width="54" height="5" rx="2" fill="#e6a800" />

  <!-- 铃舌 -->
  <circle cx="64" cy="77" r="4" fill="#e6a800" />

  <!-- 左侧声波 -->
  <path d="M28 56 Q18 64, 28 72" fill="none" stroke="#ffecb3" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <path d="M22 48 Q8 64, 22 80" fill="none" stroke="#ffecb3" stroke-width="2" stroke-linecap="round" opacity="0.5" />

  <!-- 右侧声波 -->
  <path d="M100 56 Q110 64, 100 72" fill="none" stroke="#ffecb3" stroke-width="2" stroke-linecap="round" opacity="0.7" />
  <path d="M106 48 Q120 64, 106 80" fill="none" stroke="#ffecb3" stroke-width="2" stroke-linecap="round" opacity="0.5" />

  <!-- 铃铛上的"叮"字 -->
  <text x="64" y="66" text-anchor="middle" font-family="Arial, sans-serif"
        font-size="20" font-weight="bold" fill="#7b4e00" opacity="0.85">叮</text>
</svg>
